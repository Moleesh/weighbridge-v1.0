name: WeighBridge 1.0

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        java-version: ['22']

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # Set up JDK
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'adopt'
      
      # Build the project using Maven
      - name: Build with Maven
        run: mvn clean package verify
      
      # Create a git tag (only on master branch push)
      - name: Create git tag
        if: github.ref == 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag v1.0.0
          git push origin v1.0.0

      # Create ZIP file from artifact (only on tag push)
      - name: Create ZIP file for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          powershell -Command "Compress-Archive -Path 'WeighBridge 1.0' -DestinationPath 'WeighBridge-1.0.zip'"

      # Create GitHub Release with ZIP (only on tag push)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: WeighBridge-1.0.zip
