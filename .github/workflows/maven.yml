name: WeighBridge 1.0

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    strategy:
      matrix:
        java-version: ['22']

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Set up JDK
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'adopt'
      
      # Build the project using Maven
      - name: Build with Maven
        run: mvn clean package verify
      
      # Upload the build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WeighBridge 1.0
          path: WeighBridge 1.0

      # Remove existing tag and create a new one
      - name: Delete and recreate git tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Delete local tag if it exists
          git tag -d v1.0.0 2>/dev/null || true
          
          # Delete remote tag if it exists
          git push origin --delete v1.0.0 2>/dev/null || true
          
          # Create new tag
          git tag v1.0.0
          git push origin v1.0.0

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          files: WeighBridge 1.0/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
